<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login - Recipe Nest</title>

  <!-- Bootstrap + Icons (CDN) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

  <style>
    html, body { height: 100%; }
    body { background-color: var(--bs-body-bg); }
    .rn-login-card { max-width: 420px; }
  </style>
</head>

<body class="d-flex align-items-center py-5 bg-body-tertiary">

  <main class="container">
    <div class="mx-auto rn-login-card">
      <div class="card shadow-sm">
        <div class="card-body p-4">

          <div class="text-center mb-3">
            <div class="display-6 fw-semibold">
              <i class="bi bi-bookmark-heart me-2"></i>Recipe Nest
            </div>
            <div class="text-muted">Demo login</div>
          </div>

          <!-- Non-functional form for demo -->
          <form onsubmit="return false;">
            <div class="mb-3 text-start">
              <label for="email" class="form-label">Email</label>
              <input id="email" type="email" class="form-control" placeholder="name@example.com" required>
            </div>

            <div class="mb-3 text-start">
              <label for="password" class="form-label">Password</label>
              <input id="password" type="password" class="form-control" placeholder="Password" required>
            </div>

            <div class="d-grid gap-2">
              <!-- Required by your assignment: two links -->
              <a class="btn btn-primary" href="index.html">
                <i class="bi bi-person-check me-2"></i>Login as User
              </a>

              <a class="btn btn-danger" href="admin.html">
                <i class="bi bi-shield-lock me-2"></i>Login as Admin
              </a>

              <a class="btn btn-outline-secondary" href="register.html">
                <i class="bi bi-person-plus me-2"></i>Create Account
              </a>
            </div>
          </form>

        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

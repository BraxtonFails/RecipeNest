  <div class="d-flex flex-column min-vh-100">
  <header class="rn-header border-bottom">
    <nav class="navbar navbar-expand-lg navbar-light">
      <div class="container">
        <a href="../index.html" class="navbar-brand rn-brand-link d-flex align-items-center"><span class="rn-brand-text">RecipeNest</span></a>
        <button class="navbar-toggler rn-nav-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav" aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation"><span class="navbar-toggler-icon"></span></button>
        <div class="collapse navbar-collapse" id="mainNav">
          <ul class="navbar-nav ms-auto gap-1 gap-lg-2">
            <li class="nav-item"><a class="nav-link rn-nav-link" href="../index.html">Home</a></li>
            <li class="nav-item"><a class="nav-link rn-nav-link active" aria-current="page" href="profile.html">Profile</a></li>

  <main class="py-5">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-lg-8">
          <div class="card rn-card rn-upload-card">
            <div class="card-body p-4">
              <h1 class="rn-upload-title">Profile</h1>
              <p class="text-muted mb-4">Manage your account and preferences. (Demo – non-functional.)</p>
              <div class="row g-3">
                <div class="col-md-6">
                  <label class="form-label fw-semibold">Display name</label>
                  <input type="text" class="form-control" placeholder="Your name" readonly>
                </div>
                <div class="col-md-6">
                  <label class="form-label fw-semibold">Email</label>
                  <input type="email" class="form-control" placeholder="you@example.com" readonly>
                </div>
                <div class="col-12">
                  <label class="form-label fw-semibold">Bio</label>
                  <textarea class="form-control" rows="3" placeholder="A short bio..." readonly></textarea>
                </div>
              </div>
              <hr class="my-4">
              <a href="../index.html" class="btn btn-rn-outline">Back to Home</a>
            </div>
          </div>

<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Register - Recipe Nest</title>

  <!-- Bootstrap + Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

  <style>
    body { background-color: var(--bs-body-tertiary); }
    .rn-register-card { max-width: 500px; }
  </style>
</head>

<body class="d-flex align-items-center py-5">

  <main class="container">
    <div class="mx-auto rn-register-card">
      <div class="card shadow-sm">
        <div class="card-body p-4">

          <div class="text-center mb-3">
            <div class="display-6 fw-semibold">
              <i class="bi bi-bookmark-heart me-2"></i>Recipe Nest
            </div>
            <div class="text-muted">Create your account</div>
          </div>

          <!-- Non-functional demo form -->
          <form onsubmit="return false;">
            
            <div class="row">
              <div class="col-md-6 mb-3">
                <label class="form-label">First Name</label>
                <input type="text" class="form-control" placeholder="John" required>
              </div>

              <div class="col-md-6 mb-3">
                <label class="form-label">Last Name</label>
                <input type="text" class="form-control" placeholder="Doe" required>
              </div>
            </div>

            <div class="mb-3">
              <label class="form-label">Phone Number</label>
              <input type="tel" class="form-control" placeholder="(123) 456-7890" required>
            </div>

            <div class="mb-3">
              <label class="form-label">Email Address</label>
              <input type="email" class="form-control" placeholder="name@example.com" required>
            </div>

            <div class="mb-3">
              <label class="form-label">Password</label>
              <input type="password" class="form-control" placeholder="Enter password" required>
            </div>

            <div class="mb-3">
              <label class="form-label">Confirm Password</label>
              <input type="password" class="form-control" placeholder="Confirm password" required>
            </div>

            <div class="d-grid gap-2">
              <a href="index.html" class="btn btn-success">
                <i class="bi bi-person-check me-2"></i>Register (Demo)
              </a>

              <a href="login.html" class="btn btn-outline-secondary">
                <i class="bi bi-arrow-left me-2"></i>Back to Login
              </a>
            </div>

          </form>

        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Register - Recipe Nest</title>
  <link rel="stylesheet" href="../style/login.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
</head>
<body>
  <div class="wrapper">
    <h2 class="recipe-nest-title">Recipe Nest</h2>
    <form onsubmit="return false;">
      <h1>Create your account</h1>

      <div class="form-row">
        <div class="input-box">
          <input type="text" placeholder="First Name" required>
          <i class="bx bxs-user"></i>
        </div>
        <div class="input-box">
          <input type="text" placeholder="Last Name" required>
          <i class="bx bxs-user"></i>
        </div>
      </div>

      <div class="input-box">
        <input type="tel" placeholder="(123) 456-7890" required>
        <i class="bx bxs-phone"></i>
      </div>

      <div class="input-box">
        <input type="email" placeholder="name@example.com" required>
        <i class="bx bxs-envelope"></i>
      </div>

      <div class="input-box">
        <input type="password" placeholder="Password" required>
        <i class="bx bxs-lock-alt"></i>
      </div>

      <div class="input-box">
        <input type="password" placeholder="Confirm password" required>
        <i class="bx bxs-lock"></i>
      </div>

      <a href="../index.html" class="btn">Register (Demo)</a>

      <div class="register-link">
        <p>Already have an account? <a href="login.html">Back to Login</a></p>
      </div>
    </form>
  </div>
</body>
</html>
